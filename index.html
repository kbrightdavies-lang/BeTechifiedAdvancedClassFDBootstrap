<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Advanced Class Form Assignment</h1>

<form action="#" method="post">
    <h1>Content Form</h1>

     
    <label for="name">Full Name</label>
    <input type="text" id="name" name="name" placeholder="e.g John Doe">
     

     
    <label for="email">Email Address</label>
    <input type="email" id="email" name="email" placeholder="johndoe@gmail.com">
     

     
    <label for="number">Phone Number</label>
    <input type="number" id="phone" name="phone" placeholder="+233555763404">
     

     
    <label for="message">Message</label>
    <input type="text" id="message" name="Message" placeholder="Message...">
     

     
    <button type="submit" id="btn">Send a Message</button>
    
</form>

</body>
</html>
